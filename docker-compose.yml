services:
  db:
    image: postgres:16-alpine
    container_name: auto-centre-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: autocentre
      POSTGRES_PASSWORD: autocentre
      POSTGRES_DB: autocentre
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autocentre -d autocentre"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
